#           http:
#             idleTimeout: 60s
#         loadBalancer:
#           simple: LEAST_REQUEST
#         outlierDetection:
#           baseEjectionTime: 30s
#           consecutive5xxErrors: 0
#           consecutiveGatewayErrors: 0
#           consecutiveLocalOriginFailures: 1
#           interval: 5s
#           maxEjectionPercent: 100
#           splitExternalLocalOriginErrors: true
- target:
    kind: Deployment
  patch: |-
    - op: add
      path: /spec/replicas
      value: 5
- target:
    kind: Deployment
    name: productpage-v1
  patch: |-
    - op: add
      path: /spec/replicas
      value: 1