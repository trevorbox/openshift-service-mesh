apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
- name: spring-boot-demo
  repo: https://trevorbox.github.io/helm-charts
  valuesFile: values.yaml
  namespace: spring-boot-demo
  version: ~0.0.19
  releaseName: spring-boot-demo

# patches:
#   - target:
#       version: v1
#       kind: Service
#       name: spring-boot-demo-headless
#     patch: |-
#       apiVersion: v1
#       kind: Service
#       metadata:
#         name: spring-boot-demo-headless
#       $patch: delete

patches:
  - target:
      kind: Service
      name: spring-boot-demo-headless
    patch: |-
      - op: add
        path: /metadata/annotations/networking.istio.io~1exportTo
        value: cryostat
#      - op: remove
#        path: /spec/ports/1
  - target:
        kind: Deployment
        name: spring-boot-demo
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: spring-boot-demo
      spec:
        template:
          spec:
            containers:
              - name: spring-boot-demo
                # 1. Keep /tmp as the working directory for write permissions
                workingDir: /tmp
                # 2. Update args to point to the application classpath
                command: ["java"]
                args:
                  - "-XX:MaxRAMPercentage=50.0"
                  - '-Dcom.sun.management.jmxremote.port=9091'
                  - '-Dcom.sun.management.jmxremote.rmi.port=9091'
                  - '-Dcom.sun.management.jmxremote.ssl=false'
                  - '-Dcom.sun.management.jmxremote.authenticate=false'
                  - "-jar"
                  - "/application/application.jar"
