---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../components/cryostat

patches:
  - target:
      kind: Namespace
      name: cryostat
    patch: |-
      - op: add
        path: /metadata/labels
        value: {"istio.io/rev": "default"}
  - target:
        kind: Cryostat
        name: cryostat
    patch: |-
      - op: add
        path: /spec/targetDiscoveryOptions
        value:
          disableBuiltInDiscovery: true
      - op: add
        path: /spec/agentOptions
        value:
          allowInsecure: true
          disableHostnameVerification: true
          resources: {}

