apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
- name: spring-boot-demo
  repo: https://trevorbox.github.io/helm-charts
  valuesFile: values.yaml
  namespace: spring-boot-demo
  version: ~0.0.17
  releaseName: spring-boot-demo

# patches:
#   - target:
#       version: v1
#       kind: Service
#       name: spring-boot-demo-headless
#     patch: |-
#       apiVersion: v1
#       kind: Service
#       metadata:
#         name: spring-boot-demo-headless
#       $patch: delete

patches:
  - target:
      kind: Service
      name: spring-boot-demo-headless
    patch: |-
      - op: add
        path: /metadata/annotations/networking.istio.io~1exportTo
        value: cryostat
#      - op: remove
#        path: /spec/ports/1
  - path: patch-working-dir.yaml
    target:
      kind: Deployment
      name: spring-boot-demo # Ensure this matches your metadata.name