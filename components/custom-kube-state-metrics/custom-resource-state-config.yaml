apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-kube-state-metrics-config
  namespace: openshift-custom-kube-state-metrics
data:
  custom-resource-state.yaml: |
    spec:
      resources:
        ###############################################################################
        # Add your custom resources below this line
        ###############################################################################
        # Template:
        # - groupVersionKind:
        #     group: "<api-group>"
        #     version: "<version>"
        #     kind: "<Kind>"
        #   labelsFromPath:
        #     name: [metadata, name]
        #     namespace: [metadata, namespace]  # omit for cluster-scoped
        #   metrics:
        #     - name: "<metric_name>"
        #       help: "<description>"
        #       each:
        #         type: Gauge  # or StateSet, Info
        #         gauge:
        #           path: [status, someField]
        #           nilIsZero: true

        ###############################################################################
        # Hanging PipelineRun detection — tracks PipelineRuns stuck on finalizers
        # after the Tekton pruner requested deletion.
        ###############################################################################
        - groupVersionKind:
            group: "tekton.dev"
            version: "v1"
            kind: "PipelineRun"
          labelsFromPath:
            pipelinerun: [metadata, name]
            namespace: [metadata, namespace]
            pipeline: [metadata, labels, tekton.dev/pipeline]
            finalizers: [metadata, finalizers]
          metrics:
            - name: "konflux_pipelinerun_deletion_timestamp_seconds"
              help: "Unix timestamp when deletion was requested (0 = not deleted). Use > 0 to find stuck PipelineRuns."
              each:
                type: Gauge
                gauge:
                  path: [metadata, deletionTimestamp]
                  nilIsZero: true

        ###############################################################################
        # Hanging TaskRun detection — tracks TaskRuns stuck on finalizers
        # after the Tekton pruner requested deletion.
        ###############################################################################
        - groupVersionKind:
            group: "tekton.dev"
            version: "v1"
            kind: "TaskRun"
          labelsFromPath:
            taskrun: [metadata, name]
            namespace: [metadata, namespace]
            pipeline: [metadata, labels, tekton.dev/pipeline]
            pipelinetask: [metadata, labels, tekton.dev/pipelineTask]
            pipelinerun: [metadata, labels, tekton.dev/pipelineRun]
            finalizers: [metadata, finalizers]
          metrics:
            - name: "konflux_taskrun_deletion_timestamp_seconds"
              help: "Unix timestamp when deletion was requested (0 = not deleted). Use > 0 to find stuck TaskRuns."
              each:
                type: Gauge
                gauge:
                  path: [metadata, deletionTimestamp]
                  nilIsZero: true
