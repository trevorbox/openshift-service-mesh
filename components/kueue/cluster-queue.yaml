apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: "default-flavor"
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: "team-a-cluster-queue"
spec:
  namespaceSelector: {} # Allows any namespace to point here, or restrict it to team-a
  resourceGroups:
  - flavors:
    - name: "default-flavor"
      resources:
      - name: "tekton.dev/pipelineruns"
        nominalQuota: 2
