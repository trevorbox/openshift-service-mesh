apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: cluster-pipeline-queue
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  namespaceSelector: {} # Allows any namespace to point here, or restrict it to team-a
  resourceGroups:
  - coveredResources:
    - tekton.dev/pipelineruns
    - cpu
    - memory
    - pods
    flavors:
    - name: default
      resources:
      - name: "tekton.dev/pipelineruns"
        nominalQuota: '20'
      - name: "cpu"
        nominalQuota: '9'
      - name: "memory"
        nominalQuota: 36Gi
      - name: "pods"
        nominalQuota: '10000'
