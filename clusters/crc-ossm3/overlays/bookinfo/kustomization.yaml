apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../components/bookinfo

patches:
- target:
    kind: Certificate
  patch: |
    - path: /spec/dnsNames/0
      op: replace
      value: bookinfo-istio-ingress.apps-crc.testing
- target:
    kind: Gateway
  patch: |
    - path: /spec/servers/0/hosts/0
      op: replace
      value: bookinfo-istio-ingress.apps-crc.testing
- target:
    kind: VirtualService
    group: networking.istio.io
  patch: |
    - path: /spec/hosts
      op: replace
      value: 
        - bookinfo-istio-ingress.apps-crc.testing
- target:
    kind: Deployment
    name: productpage-v1
  patch: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: productpage-v1
    spec:
      template:
        metadata:
          annotations:
            sidecar.istio.io/logLevel: 'rbac:debug,jwt:debug'  # enable RBAC and JWT debug logging
            sidecar.istio.io/proxyMemory: 1Gi
            sidecar.istio.io/proxyMemoryLimit: 1Gi
            sidecar.istio.io/proxyCPU: 50m
            sidecar.istio.io/proxyCPULimit: '2'
