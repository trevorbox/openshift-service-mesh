---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cryostat-cron-sa
  namespace: cryostat
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cryostat-cron-view-binding
  namespace: cryostat
subjects:
  - kind: ServiceAccount
    name: cryostat-cron-sa
    namespace: cryostat
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  # The "view" role is usually sufficient for the OAuth proxy 
  # to permit API requests to the service.
  name: view
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cryostat-scheduled-recording
  namespace: cryostat
spec:
  schedule: "*/2 * * * *"
  # timeZone: "America/Phoenix"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 0
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 30
      template:
        metadata:
          labels:
            sidecar.istio.io/inject: 'true'
        spec:
          serviceAccountName: cryostat-cron-sa
          containers:
          - name: cryostat-trigger
            image: curlimages/curl:latest
            env:
            - name: TZ
              value: "America/Phoenix"
            command: ["/bin/sh", "-c"]
            args:
              - |
                # --- CONFIGURATION SECTION ---
                MATCH_LABEL="app.kubernetes.io/name=spring-boot-demo"
                REC_DURATION_MINS=5
                MAX_SIZE_MIB=100
                # -----------------------------

                # 1. Perform Math
                DURATION_SECS=$(( REC_DURATION_MINS * 60 ))
                MAX_SIZE_BYTES=$(( MAX_SIZE_MIB * 1024 * 1024 ))

                TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                API_URL="http://cryostat:4180/api/v4/graphql"
                
                # 2. Discovery: Find pods matching the configured label
                # We use escaped quotes to ensure the shell variable $MATCH_LABEL is expanded
                TARGETS=$(curl -k -s -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "{ \"query\": \"query { targetNodes(filter: { labels: \\\"$MATCH_LABEL\\\" }) { name } }\" }" \
                  $API_URL | grep -o 'service:jmx:[^"]*')

                # 3. Iteration: Start recordings for each pod found
                for T in $TARGETS; do
                  # Extract IP for a unique filename
                  FULL_DATE=$(date +"%Y-%m-%d_%H%M%S")
                  REC_NAME="cryostat-scheduled-recording-${FULL_DATE}"
                  
                  echo "Triggering $REC_NAME for target $T"
                  
                  # 4. Mutation: Execute the createRecording call
                  curl -k -s -X POST "$API_URL" \
                    -H "Authorization: Bearer $TOKEN" \
                    -H "Content-Type: application/json" \
                    -d "{
                      \"query\": \"mutation { createRecording(nodes: { name: \\\"$T\\\" }, recording: { name: \\\"$REC_NAME\\\", template: \\\"Profiling\\\", templateType: \\\"TARGET\\\", duration: $DURATION_SECS, maxSize: $MAX_SIZE_BYTES }) { name } }\"
                    }"
                done
          restartPolicy: OnFailure