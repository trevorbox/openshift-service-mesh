apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../components/bookinfo

patches:
- target:
    kind: Gateway
  patch: |
    spec:
      hosts:
        - bookinfo-istio-ingress.apps-crc.testing
- target:
    kind: VirtualService
  patch: |
    spec:
      hosts:
        - bookinfo-istio-ingress.apps-crc.testing
- target:
    kind: Deployment
    name: productpage-v1
  patch: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: productpage-v1
    spec:
      template:
        metadata:
          annotations:
            sidecar.istio.io/logLevel: 'rbac:debug,jwt:debug'  # enable RBAC and JWT debug logging
# - target:
