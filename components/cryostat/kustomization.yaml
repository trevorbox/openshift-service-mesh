---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# namespace: cryostat

resources:
  - namespace-cryostat.yaml
  - cryostat-cryostat.yaml  
  - service-cryostat-headless.yaml
  - networkpolicy-allow-any-istio-rev.yaml
  - networkpolicy-allow-istio-system.yaml
  - networkpolicy-user-workload-access.yaml
  - podmonitor-istio-proxies-monitor.yaml
  - sidecar-default.yaml
  - sidecar-cryostat.yaml
  - networkpolicy-allow-cryostat-operator.yaml

  # Disble mtls or enable ingress through a istio gateway
  - peerauthentication-disable-mtls-cryostat-ui.yaml
  # - gateway/
  # - cronjob-cryostat-scheduled-recording.yaml
  - consolelink-cryostat.yaml

patches:
  - target:
      kind: Cryostat
      name: cryostat
    patch: |-
      - op: add
        path: "/spec/targetNamespaces"
        value:  
          - spring-boot-demo
          - spring-boot-demo2
  - target:
      kind: Sidecar
      name: cryostat
    patch: |-
      - op: replace
        path: "/spec/egress/0/hosts"
        value: 
          - "./*"
          - "spring-boot-demo/*"
          - "spring-boot-demo2/*"