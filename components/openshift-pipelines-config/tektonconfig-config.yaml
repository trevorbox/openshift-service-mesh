apiVersion: operator.tekton.dev/v1alpha1
kind: TektonConfig
metadata:
  name: config
spec:
  targetNamespace: openshift-pipelines
  pruner:
    disabled: false
    keep-since: 2
    resources:
      - pipelinerun
      - taskrun
    schedule: '*/2 * * * *'
  platforms:
    openshift:
  pipeline:
    options:
      disabled: false
      deployments:
        # tekton-triggers-core-interceptors:
        #   spec:
        #     replicas: 2
        #     template:
        #       spec:
        #         containers:
        #           - name: tekton-triggers-core-interceptors
        #             resources:
        #               limits:
        #                 cpu: 500m
        #                 memory: 1Gi
        #               requests:
        #                 cpu: 500m
        #                 memory: 1Gi
        tekton-operator-proxy-webhook:
          spec:
            replicas: 2
            template:
              spec:
                containers:
                  - name: proxy
                    resources:
                      limits:
                        cpu: 500m
                        memory: 500Mi
                      requests:
                        cpu: 100m
                        memory: 100Mi
        tekton-pipelines-webhook:
          spec:
            template:
              spec:
                containers:
                  - name: webhook
                    resources:
                      limits:
                        cpu: "1"
                        memory: 1Gi
                      requests:
                        cpu: 400m
                        memory: 1Gi
        pipelines-as-code-controller:
          spec:
            template:
              spec:
                containers:
                  - name: pac-controller
                    resources:
                      limits:
                        cpu: 500m
                        memory: 2560Mi
                      requests:
                        cpu: 500m
                        memory: 2560Mi
        pipelines-as-code-watcher:
          spec:
            template:
              spec:
                containers:
                  - name: pac-watcher
                    resources:
                      limits:
                        cpu: 250m
                        memory: 1Gi
                      requests:
                        cpu: 250m
                        memory: 1Gi
        pipelines-as-code-webhook:
          spec:
            template:
              spec:
                containers:
                  - name: pac-webhook
                    resources:
                      limits:
                        cpu: 400m
                        memory: 100Mi
                      requests:
                        cpu: 400m
                        memory: 100Mi
        pipelines-console-plugin:
          spec:
            template:
              spec:
                containers:
                  - name: pipelines-console-plugin
                    resources:
                      limits:
                        cpu: 200m
                        memory: 8Mi
                      requests:
                        cpu: 200m
                        memory: 8Mi
        tekton-chains-controller:
          spec:
            template:
              spec:
                containers:
                  - name: tekton-chains-controller
                    resources:
                      limits:
                        cpu: 1500m
                        memory: 8Gi
                      requests:
                        cpu: 1500m
                        memory: 8Gi
        tekton-events-controller:
          spec:
            template:
              spec:
                containers:
                  - name: tekton-events-controller
                    resources:
                      limits:
                        cpu: 200m
                        memory: 64Mi
                      requests:
                        cpu: 200m
                        memory: 64Mi
        tekton-triggers-controller:
          spec:
            template:
              spec:
                containers:
                  - name: tekton-triggers-controller
                    resources:
                      limits:
                        cpu: 400m
                        memory: 64Mi
                      requests:
                        cpu: 400m
                        memory: 64Mi
        tekton-triggers-webhook:
          spec:
            template:
              spec:
                containers:
                  - name: webhook
                    resources:
                      limits:
                        cpu: 250m
                        memory: 50Mi
                      requests:
                        cpu: 250m
                        memory: 50Mi
        tekton-triggers-core-interceptors:
          spec:
            template:
              spec:
                containers:
                  - name: tekton-triggers-core-interceptors
                    resources:
                      limits:
                        cpu: 500m
                        memory: 1Gi
                      requests:
                        cpu: 500m
                        memory: 1Gi
        tkn-cli-serve:
          spec:
            replicas: 0
            template:
              spec:
                containers:
                  - name: tkn-cli-serve
                    resources:
                      limits:
                        cpu: 250m
                        memory: 64Mi
                      requests:
                        cpu: 250m
                        memory: 64Mi