apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
- name: spring-boot-demo
  repo: https://trevorbox.github.io/helm-charts
  valuesFile: values.yaml
  namespace: spring-boot-demo2
  version: ~0.0.19
  releaseName: spring-boot-demo2

resources:
  - istio-configs.yaml
  - namespace-spring-boot-demo2.yaml

patches:
  - target:
      kind: Service
      name: spring-boot-demo2-headless
    patch: |-
      - op: add
        path: /metadata/annotations/networking.istio.io~1exportTo
        value: cryostat
  - target:
        kind: Deployment
        name: spring-boot-demo
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: spring-boot-demo
      spec:
        template:
          spec:
            containers:
              - name: spring-boot-demo
                # 1. Keep /tmp as the working directory for write permissions
                workingDir: /tmp
                # 2. Update args to point to the application classpath
                command: ["java"]
                args:
                  - "-XX:MaxRAMPercentage=80.0"
                  - "-jar"
                  - "/application/application.jar"
