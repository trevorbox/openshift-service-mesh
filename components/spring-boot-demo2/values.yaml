istio:
  enabled: false
ingressgateway:
  host: spring-boot-demo2-istio-ingress.apps-crc.testing
fullnameOverride: spring-boot-demo2
replicaCount: 1
cryostat:
  agent:
    enabled: false
  jmx:
    enabled: true
  headlessService:
    enabled: true
    ports:
    - name: cryostat-agent
      protocol: TCP
      appProtocol: tcp
      port: 9977
      targetPort: 9977
    - name: jfr-jmx
      protocol: TCP
      appProtocol: tcp
      port: 9091
      targetPort: 9091
image:
  repository: quay.io/trevorbox/spring-boot-micro-jre
resources:
  limits:
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 1Gi